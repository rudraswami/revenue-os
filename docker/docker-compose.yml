services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: growthsync-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: growthsync
      POSTGRES_PASSWORD: growthsync_dev
      POSTGRES_DB: growthsync
    volumes:
      - growthsync_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U growthsync -d growthsync"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: growthsync-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - growthsync_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  growthsync_pgdata:
  growthsync_redis:
