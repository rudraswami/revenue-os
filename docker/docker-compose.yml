services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: revenue-os-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: revenue_os
      POSTGRES_PASSWORD: revenue_os_dev
      POSTGRES_DB: revenue_os
    volumes:
      - revenue_os_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U revenue_os -d revenue_os"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: revenue-os-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - revenue_os_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  revenue_os_pgdata:
  revenue_os_redis:
