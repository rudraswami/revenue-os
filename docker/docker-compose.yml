services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: growvisi-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: growvisi
      POSTGRES_PASSWORD: growvisi_dev
      POSTGRES_DB: growvisi
    volumes:
      - growvisi_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U growvisi -d growvisi"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: growvisi-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - growvisi_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  growvisi_pgdata:
  growvisi_redis:
