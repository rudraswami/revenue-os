name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: revenue_os
          POSTGRES_PASSWORD: revenue_os_dev
          POSTGRES_DB: revenue_os
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U revenue_os -d revenue_os"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate
        env:
          DATABASE_URL: postgresql://revenue_os:revenue_os_dev@localhost:5432/revenue_os

      - run: pnpm db:push
        env:
          DATABASE_URL: postgresql://revenue_os:revenue_os_dev@localhost:5432/revenue_os
          DIRECT_URL: postgresql://revenue_os:revenue_os_dev@localhost:5432/revenue_os

      - run: pnpm typecheck
        env:
          DATABASE_URL: postgresql://revenue_os:revenue_os_dev@localhost:5432/revenue_os
          DIRECT_URL: postgresql://revenue_os:revenue_os_dev@localhost:5432/revenue_os
          JWT_SECRET: ci-test-secret-minimum-32-characters-long
          REDIS_URL: redis://localhost:6379

      - name: Run tests
        run: pnpm test
        env:
          DATABASE_URL: postgresql://revenue_os:revenue_os_dev@localhost:5432/revenue_os
          DIRECT_URL: postgresql://revenue_os:revenue_os_dev@localhost:5432/revenue_os
          JWT_SECRET: ci-test-secret-minimum-32-characters-long
          REDIS_URL: redis://localhost:6379

      - name: Lint
        run: pnpm --filter @growvisi/api lint && pnpm --filter @growvisi/web lint

      - run: pnpm build
        env:
          DATABASE_URL: postgresql://revenue_os:revenue_os_dev@localhost:5432/revenue_os
          DIRECT_URL: postgresql://revenue_os:revenue_os_dev@localhost:5432/revenue_os
          JWT_SECRET: ci-test-secret-minimum-32-characters-long
          REDIS_URL: redis://localhost:6379
          NEXT_PUBLIC_API_URL: http://127.0.0.1:4000/api/v1

      - name: Bundle budget gate (P2 warn)
        run: pnpm check:bundle-budget --rebuild
        env:
          DATABASE_URL: postgresql://revenue_os:revenue_os_dev@localhost:5432/revenue_os
          DIRECT_URL: postgresql://revenue_os:revenue_os_dev@localhost:5432/revenue_os
          JWT_SECRET: ci-test-secret-minimum-32-characters-long
          NEXT_PUBLIC_API_URL: http://127.0.0.1:4000/api/v1

      - name: Seed E2E user
        run: pnpm --filter @growvisi/database exec tsx prisma/seed.ts
        env:
          DATABASE_URL: postgresql://revenue_os:revenue_os_dev@localhost:5432/revenue_os
          DIRECT_URL: postgresql://revenue_os:revenue_os_dev@localhost:5432/revenue_os
          SEED_USER_EMAIL: demo@growvisi.com
          SEED_USER_PASSWORD: demo123456

      - name: Seed inbox certification fixture
        run: pnpm seed:inbox-cert
        env:
          DATABASE_URL: postgresql://revenue_os:revenue_os_dev@localhost:5432/revenue_os
          DIRECT_URL: postgresql://revenue_os:revenue_os_dev@localhost:5432/revenue_os

      - name: Install Playwright
        run: pnpm --filter @growvisi/web exec playwright install chromium --with-deps

      - name: Full E2E certification (dashboard + inbox Phases A,G,H + P1 UX)
        run: pnpm certify:e2e
        env:
          CI: true
          DATABASE_URL: postgresql://revenue_os:revenue_os_dev@localhost:5432/revenue_os
          DIRECT_URL: postgresql://revenue_os:revenue_os_dev@localhost:5432/revenue_os
          JWT_SECRET: ci-test-secret-minimum-32-characters-long
          REDIS_URL: redis://localhost:6379
          E2E_EMAIL: demo@growvisi.com
          E2E_PASSWORD: demo123456
          NEXT_PUBLIC_API_URL: http://127.0.0.1:4000/api/v1

      - name: P0 certification probe (API latency + auth cache)
        run: |
          node apps/api/dist/main &
          API_PID=$!
          sleep 8
          pnpm certify:p0-local --skip-webhook || STATUS=$?
          pnpm certify:p1-performance || true
          kill $API_PID 2>/dev/null || true
          exit ${STATUS:-0}
        env:
          DATABASE_URL: postgresql://revenue_os:revenue_os_dev@localhost:5432/revenue_os
          DIRECT_URL: postgresql://revenue_os:revenue_os_dev@localhost:5432/revenue_os
          JWT_SECRET: ci-test-secret-minimum-32-characters-long
          REDIS_URL: redis://localhost:6379
          E2E_EMAIL: demo@growvisi.com
          E2E_PASSWORD: demo123456
          API_URL: http://127.0.0.1:4000/api/v1
